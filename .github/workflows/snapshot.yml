name: Publish Snapshot

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    name: Build and publish snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure version is a SNAPSHOT
        shell: bash
        run: |
          set -euo pipefail

          project_version="$(mvn -B -ntp -q help:evaluate -Dexpression=project.version -DforceStdout)"

          if [[ "$project_version" != *-SNAPSHOT ]]; then
            mvn -B -ntp versions:set \
              -DnewVersion="${project_version}-SNAPSHOT" \
              -DgenerateBackupPoms=false
          fi

      - name: Build and publish snapshot
        run: mvn -B -ntp clean deploy -DskipTests -Dskip.validator.tests=true
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
